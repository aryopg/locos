# Publishes the static site in web/ to GitHub Pages.
# Serves at https://aryopg.com/locos/ (custom-domain propagation from the
# aryopg.github.io user site). Do NOT add a CNAME file to this repo.
#
# Before this runs: repo Settings -> Pages -> Source = "GitHub Actions".
# (GitHub Pages on a private repo requires GitHub Pro; otherwise make the repo public.)
name: Deploy web/ to GitHub Pages

on:
  push:
    branches: [main]
    paths: ["web/**", ".github/workflows/pages.yml"]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./web
      - id: deployment
        uses: actions/deploy-pages@v4
