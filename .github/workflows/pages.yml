# Publishes the static site in web/ to GitHub Pages.
#
# First-time setup:
# - Add a repository secret named PAGES_TOKEN with permission to enable/configure
#   Pages for this repo.
# - The workflow will publish the project page from web/.
#
# If aryopg.com is served by Cloudflare rather than GitHub Pages, this workflow
# will still publish a GitHub Pages copy; route aryopg.com/locos through
# Cloudflare separately if you want that path to serve this artifact.
name: Deploy web/ to GitHub Pages

on:
  push:
    branches: [main]
    paths: ["web/**", ".github/workflows/pages.yml"]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
        with:
          enablement: true
          token: ${{ secrets.PAGES_TOKEN }}
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./web
      - id: deployment
        uses: actions/deploy-pages@v4
