# --- Sampling ---
temperature: 1.0
sampling_top_p: 0.95
sampling_top_k: 64

# --- Model / hardware ---
max_model_len: null
tensor_parallel_size: 2
# Tuned for the native ablation / greedy paths (paged KV cache + continuous
# batching). 27B bf16 / TP=2 ≈ 27 GB per rank; 0.80 × 80 GB H100 = 64 GB
# total → ~37 GB KV-cache + activation budget per rank. Slightly more
# conservative than TP=1 configs (TP all-reduce buffers eat into headroom).
# LOCOS ablation mode isn't used in this project.
gpu_memory_utilization: 0.80
