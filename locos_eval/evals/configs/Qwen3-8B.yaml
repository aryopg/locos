# --- Sampling ---
temperature: 0.6
sampling_top_p: 0.95
sampling_top_k: 20

# --- Model / hardware ---
max_model_len: null
tensor_parallel_size: 1
# Tuned for the native ablation / greedy paths (paged KV cache + continuous
# batching). 8B bf16 ≈ 16 GB; 0.85 × 80 GB H100 = 68 GB → ~52 GB KV-cache budget.
# Decore mode isn't used in this project — bump down via
# DECORE_GPU_MEMORY_UTILIZATION if you reintroduce it.
gpu_memory_utilization: 0.85
