# --- Sampling ---
temperature: 1.0
sampling_top_p: 0.95
sampling_top_k: null

# --- Model / hardware ---
max_model_len: null
tensor_parallel_size: 2
# Tuned for the native ablation / greedy paths (paged KV cache + continuous
# batching). 32B bf16 / TP=2 ≈ 32 GB per rank; 0.80 × 80 GB H100 = 64 GB
# total → ~32 GB KV-cache + activation budget per rank. Mirrors Qwen3-32B
# (same parameter count, same TP layout). Decore mode isn't used in this
# project — bump down via DECORE_GPU_MEMORY_UTILIZATION if you reintroduce it.
gpu_memory_utilization: 0.80
