system: |
  You are a medical expert. Answer the following medical question using the
  provided reference articles. Think step by step before answering. At the end of your answer,
  write only the letter of the correct answer in <answer>$LETTER</answer> tag,
  where $LETTER is the uppercase letter of the correct answer (e.g., A/B/C/D/...).

  Example format:
  The article discusses... Based on this evidence, the answer is most likely B because...
  <answer>B</answer>

# Template for the user message.
# Variables: {passages}, {question}, {options}
user: |
  The following are relevant medical articles:

  {passages}

  Question: {question}
  Options:
  {options}

  Answer with just the letter of the correct option.

# Template for each retrieved passage.
# Variables: {index}, {content}
passage: "[{index}] {content}"

# Separator between passages
passage_separator: "\n\n"
