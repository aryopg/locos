system: >
  You are a medical scribe. Given a doctor-patient dialogue, generate a
  clinical note summarizing the encounter. The clinical note must contain
  the "Assessment" and "Plan" sections. The "Assessment" section is the
  evaluation of the patient's status through analysis of the problem,
  possible interaction of the problems, changes in the status of the problems,
  and differential diagnoses. The "Plan" section details the medical reasoning
  and treatment plan needed to address the patient's illnesses.
  Output only the clinical note, nothing else.

# Template for the user message (zero-shot).
# Variables: {dialogue}
user: |
  Dialogue:
  {dialogue}

  Clinical Note:

# Template for each few-shot example.
# Variables: {index}, {dialogue}, {note}
few_shot_example: |
  Example {index}:
  Dialogue:
  {dialogue}

  Clinical Note:
  {note}

# Separator between few-shot examples and between examples and the test prompt
few_shot_separator: "\n\n"

# ---------------------------------------------------------------------------
# LLM-judge scorer prompt
# ---------------------------------------------------------------------------

# System prompt for the judge model.
judge_system: >
  You are an expert clinical documentation evaluator. Your task is to evaluate
  a generated clinical note against a reference clinical note, using the
  original doctor-patient dialogue as ground truth.

# Template for the judge user message.
# Variables: {dialogue}, {reference_note}, {generated_note}
judge_user: |
  Below is a doctor-patient dialogue, the reference clinical note, and a
  generated clinical note. Evaluate the generated note against the reference
  on the following three axes, each scored from 1 to 5.

  ## Scoring Axes

  **Completeness** (1-5): Are all problems, diagnoses, findings, and plan
  items from the reference note captured in the generated note?
  - 1: Most key items are missing
  - 3: About half of the key items are present
  - 5: All key items from the reference are present

  **Accuracy** (1-5): Are the clinical details (findings, medications,
  dosages, reasoning, recommendations) in the generated note factually
  consistent with the reference note and the dialogue?
  - 1: Multiple factual errors or contradictions
  - 3: Mostly accurate with a few minor errors
  - 5: All details are factually consistent

  **Relevance** (1-5): Does the generated note avoid hallucinated or
  extraneous clinical information not supported by the reference note or
  the dialogue?
  - 1: Contains significant hallucinated content
  - 3: Some extraneous details but mostly on-topic
  - 5: No hallucinated or extraneous information

  ## Input

  ### Dialogue
  {dialogue}

  ### Reference Clinical Note
  {reference_note}

  ### Generated Clinical Note
  {generated_note}

  ## Instructions

  Return a JSON object with the following structure:

  ```json
  {{
    "completeness": {{"score": <1-5>, "explanation": "<brief justification>"}},
    "accuracy": {{"score": <1-5>, "explanation": "<brief justification>"}},
    "relevance": {{"score": <1-5>, "explanation": "<brief justification>"}}
  }}
  ```

  Return only the JSON object. Do not include any other text.
