# Multi-namespace configuration for EIDF Kubernetes clusters.
# Format: namespace | ssh_host | queue | gpu_product | secrets | username | email | max_days | gpu_quota
#
# Lines starting with # are comments. Whitespace around | is trimmed.
# ssh_host must match an entry in ~/.ssh/config.
# username and email are set as eidf/user and eidf/email annotations on jobs.
# max_days is the admin-enforced pod lifetime limit (0 = no limit).
# gpu_quota is the soft self-governed GPU limit (0 = no limit).
#   Namespaces with gpu_quota=0 are prioritized; limited namespaces are filled up to quota.

