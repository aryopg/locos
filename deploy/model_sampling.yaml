# Per-model recommended sampling parameters for stochastic decoding runs.
# Shared by local experiment and evaluation scripts.
# These are the model author's suggested defaults for open-ended generation.
# Deterministic greedy (temperature=0) is NOT used — all runs are stochastic (Option C).
#
# FIXME: Verify these values against each model's generation_config.json on HuggingFace.
#        The values below are best-effort from model cards as of 2026-04-09.
#
# Seeds are specified separately in the experiment matrix (default: [1, 2, 3]).

defaults:
  temperature: 0.6
  top_p: 0.9
  top_k: -1  # disabled

models:
  # --- Meta Llama ---
  # Ref: meta-llama/Meta-Llama-3-8B-Instruct generation_config.json
  meta-llama/Meta-Llama-3-8B-Instruct:
    temperature: 0.6
    top_p: 0.9

  # --- Qwen3 series ---
  # Ref: Qwen/Qwen3-* model cards suggest temperature=0.7, top_p=0.8, top_k=20
  # FIXME: Qwen3 models support "thinking mode" with different sampling;
  #        using non-thinking defaults here.
  Qwen/Qwen3-4B:
    temperature: 0.7
    top_p: 0.8
    top_k: 20

  Qwen/Qwen3-8B:
    temperature: 0.7
    top_p: 0.8
    top_k: 20

  Qwen/Qwen3-14B:
    temperature: 0.7
    top_p: 0.8
    top_k: 20

  Qwen/Qwen3-32B:
    temperature: 0.7
    top_p: 0.8
    top_k: 20

  # --- Google Gemma 3 ---
  # Ref: google/gemma-3-*-it generation_config.json
  # FIXME: Gemma 3 model cards suggest temperature=1.0 with top_k=64, top_p=0.95.
  #        These are higher temperature than others — verify this is intentional.
  google/gemma-3-4b-it:
    temperature: 1.0
    top_p: 0.95
    top_k: 64

  google/gemma-3-12b-it:
    temperature: 1.0
    top_p: 0.95
    top_k: 64

  google/gemma-3-27b-it:
    temperature: 1.0
    top_p: 0.95
    top_k: 64
